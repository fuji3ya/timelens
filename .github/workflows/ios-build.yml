name: iOS Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Unit Test (Phase 0)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode in use
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve an available iOS simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "import json,sys; d=json.load(sys.stdin); ids=[dev['udid'] for runtime,devs in d['devices'].items() if 'iOS' in runtime for dev in devs if dev.get('isAvailable') and dev['name'].startswith('iPhone')]; print(ids[0] if ids else '')")
          if [ -z "$UDID" ]; then echo "No available iOS simulator"; xcrun simctl list devices available; exit 1; fi
          echo "Using simulator UDID: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build & Test
        run: |
          set -o pipefail
          xcodebuild \
            -scheme TimeLens \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -resultBundlePath TestResults \
            clean test \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults
          if-no-files-found: ignore
